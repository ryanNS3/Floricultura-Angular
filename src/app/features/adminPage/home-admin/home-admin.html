


<main>
  <table>
      <thead>
        <caption>lista de produtos</caption>
        <tr>
          <th>Id</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Tipo</th>
          <th>Quantidade em estoque</th>
          <th>Editar</th>
          <th>Remover</th>
        </tr>
      </thead>

      <tbody>

        @for(produto of listaProdutos; track produto.id ){
          <tr>
            <td>{{produto.id}}</td>
            <td>{{produto.nome}}</td>
            <td>{{produto.preco}}</td>
            <td>{{produto.tipo}}</td>
            <td>{{produto.qtd_estoque}}</td>
            <td>
              <button id="">Editar</button>
            </td>
            <td>
              <button>Deletar</button>
            </td>
          </tr>
        }
      

      </tbody>

  </table>
</main>
