


<main>
  <div>
    <h1>Todos os produtos</h1>
    <button routerLink="admin/criarProduto" >Adicionar produto</button>
  </div>
  <table>
      <thead>
        <caption>lista de produtos</caption>
        <tr>
          <th>Id</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Tipo</th>
          <th>Quantidade em estoque</th>
          <th>Editar</th>
          <th>Remover</th>
        </tr>
      </thead>

      <tbody>
          @for(produto of listaProdutos(); track produto.id ){
            <tr>
              <td>{{produto.id}}</td>
              <td><input type="text" value={{produto.nome}} disabled></td>
              <td><input type="text" value={{produto.preco}} disabled></td>
              <td><input type="text" value={{produto.tipo}} disabled></td>
              <td><input type="text" value={{produto.qtd_estoque}} disabled></td>
              <td>
                <button [routerLink]="['admin/verProduto', produto.id]" >Editar</button>
              </td>
              <td>
                <button (click)="excluirProduto(produto.id)">Deletar</button>
              </td>
            </tr>
          }
          @empty{
            <h3>Erro ao carregar os dados</h3>
          }

      

      

      </tbody>

  </table>
</main>
